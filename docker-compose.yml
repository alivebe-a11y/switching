services:
  switching:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#main
      dockerfile: Dockerfile
    environment:
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - ${SWITCHING_DATA_DIR:-./data/cache}:/app/.cache
    entrypoint: ["switching"]
    command: ["list-detectors"]

  paper-trade:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#main
      dockerfile: Dockerfile
    environment:
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ${SWITCHING_DATA_DIR:-./data/cache}:/app/.cache
    entrypoint: ["switching"]
    command: ["paper-trade", "--seed", "20000", "--interval", "10", "--stop-loss", "0.026", "--hold-days", "5", "--max-position", "0.015", "--max-positions", "0"]
    restart: unless-stopped

  trade:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#main
      dockerfile: Dockerfile
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_PAPER=${ALPACA_PAPER:-true}
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - ${SWITCHING_DATA_DIR:-./data/cache}:/app/.cache
    entrypoint: ["switching"]
    command: ["trade", "--interval", "30", "--stop-loss", "0.05", "--hold-days", "5"]
    restart: unless-stopped

  trade-t212:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#main
      dockerfile: Dockerfile
    environment:
      - T212_API_KEY=${T212_API_KEY}
      - T212_API_SECRET=${T212_API_SECRET}
      - T212_DEMO=${T212_DEMO:-true}
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - ${SWITCHING_DATA_DIR:-./data/cache}:/app/.cache
    entrypoint: ["switching"]
    command: ["trade-t212", "--interval", "10", "--stop-loss", "0.026", "--hold-days", "5", "--max-position", "0.01", "--max-positions", "0"]
    restart: unless-stopped

  paper-trade-uk:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#main
      dockerfile: Dockerfile
    environment:
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ${SWITCHING_DATA_DIR:-./data/cache}:/app/.cache
    entrypoint: ["switching"]
    command: ["paper-trade", "--market", "uk", "--seed", "20000", "--interval", "10", "--stop-loss", "0.026", "--hold-days", "5", "--max-position", "0.015", "--max-positions", "0", "--state", "/app/.cache/uk_portfolio.json"]
    restart: unless-stopped

  dashboard:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#main
      dockerfile: Dockerfile
    environment:
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - ${SWITCHING_DATA_DIR:-./data/cache}:/app/.cache
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    entrypoint: ["switching"]
    command: ["web", "--port", "8080"]
    restart: unless-stopped
