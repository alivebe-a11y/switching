services:
  switching:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#claude/add-ai-recommendations-ABZZX
      dockerfile: Dockerfile
    environment:
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - switching-cache:/app/.cache
    entrypoint: ["switching"]
    command: ["list-detectors"]

  paper-trade:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#claude/add-ai-recommendations-ABZZX
      dockerfile: Dockerfile
    environment:
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - switching-cache:/app/.cache
    entrypoint: ["switching"]
    command: ["paper-trade", "--seed", "1000", "--interval", "10", "--stop-loss", "0.026", "--hold-days", "5"]
    restart: unless-stopped

  trade:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#claude/add-ai-recommendations-ABZZX
      dockerfile: Dockerfile
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_PAPER=${ALPACA_PAPER:-true}
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - switching-cache:/app/.cache
    entrypoint: ["switching"]
    command: ["trade", "--interval", "30", "--stop-loss", "0.05", "--hold-days", "5"]
    restart: unless-stopped

  dashboard:
    image: ${SWITCHING_IMAGE:-ghcr.io/alivebe-a11y/switching:latest}
    build:
      context: https://github.com/alivebe-a11y/switching.git#claude/add-ai-recommendations-ABZZX
      dockerfile: Dockerfile
    environment:
      - SWITCHING_EDGAR_UA=${SWITCHING_EDGAR_UA:-}
    volumes:
      - switching-cache:/app/.cache
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    entrypoint: ["switching"]
    command: ["web", "--port", "8080"]
    restart: unless-stopped

volumes:
  switching-cache:
